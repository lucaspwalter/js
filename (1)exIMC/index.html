<!DOCTYPE html>
<html lang="pt-br">
<head>

  <title>Calculadora de IMC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Calculadora de IMC</h1>
  </header>
  <section>
    <div>
      Peso (kg): <input type="number" id="txtpeso"><br><br>
      Altura (m): <input type="number" id="txtaltura" step="0.01"><br><br>

    <div id="resultado">
      Preencha os campos acima.
    </div>
  </section>
  <footer>
    <p>@lucaaswll</p>
  </footer>
